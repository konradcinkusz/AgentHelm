# Build-and-run from source: Bridge + Web + Postgres.
#   docker compose up --build
#   UI:     http://localhost:5200
#   Bridge: http://localhost:5199  (x-helm-token: dev-secret-123)
#
# Note: ACP agents (Copilot CLI, Claude Code, Gemini) are NOT available inside
# containers — they need your local environment and auth. The built-in echo
# agent works out of the box. For real agents use Option A or B from the README.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: helmdb
      POSTGRES_USER: helm
      POSTGRES_PASSWORD: helm-dev
    volumes:
      - agenthelm-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helm -d helmdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  bridge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5199:5199"
    environment:
      ConnectionStrings__helmdb: "Host=postgres;Database=helmdb;Username=helm;Password=helm-dev"
      AgentHelm__ApiToken: "dev-secret-123"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5200:8080"
    environment:
      Bridge__BaseUrl: "http://bridge:5199"
      Bridge__ApiToken: "dev-secret-123"
    depends_on:
      - bridge
    restart: unless-stopped

volumes:
  agenthelm-pgdata:

name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test first — no green, no release
        run: |
          dotnet build AgentHelm.sln -c Release
          dotnet test tests/AgentHelm.Tests -c Release --no-build

      # Portable (framework-dependent) publish: ONE zip for every OS with the
      # .NET 8 / ASP.NET Core runtime. Agents need their own runtimes anyway,
      # so requiring dotnet is not an extra burden for this audience.
      - name: Publish
        run: |
          dotnet publish src/AgentHelm.Bridge -c Release -o dist/bridge
          dotnet publish src/AgentHelm.Web -c Release -o dist/web
          dotnet publish tools/AgentHelm.EchoAgent -c Release -o dist/echo-agent

      - name: Point the echo agent at the published layout
        run: |
          jq '(.AgentHelm.Agents[] | select(.Id=="echo") | .Args) = ["${AGENTHELM_DIR}../echo-agent/AgentHelm.EchoAgent.dll"]' \
            dist/bridge/appsettings.json > /tmp/appsettings.json
          mv /tmp/appsettings.json dist/bridge/appsettings.json

      - name: Assemble zip
        run: |
          cp scripts/run.sh scripts/run.ps1 README.md LICENSE dist/
          chmod +x dist/run.sh
          cd dist && zip -rq ../agenthelm-${GITHUB_REF_NAME}.zip .

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agenthelm-*.zip
          generate_release_notes: true

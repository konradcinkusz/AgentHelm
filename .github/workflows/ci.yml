name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      # The whole solution, AppHost included — this is also the regression
      # gate for the Aspire SDK-element setup (no workload on runners).
      - name: Build
        run: dotnet build AgentHelm.sln -c Release
      - name: Test
        run: dotnet test tests/AgentHelm.Tests -c Release --no-build --logger "console;verbosity=normal"
